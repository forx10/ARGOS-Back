services:
  - type: web
    name: argos-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: DATABASE_URL
        sync: false
      - key: ABACUSAI_API_KEY
        sync: false
      - key: AUTOREMOTE_USER_KEY
        sync: false
      - key: AUTOREMOTE_BASE_URL
        sync: false
